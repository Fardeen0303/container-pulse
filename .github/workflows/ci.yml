name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install flake8
      - run: flake8 monitor/ dashboard/ tests/ --max-line-length=120 --ignore=E501,W503,E127

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install docker slack-sdk prometheus-client requests pytest pytest-cov fastapi jinja2 kubernetes
      - run: pytest tests/ --cov=monitor --cov-report=term-missing -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v3
      - name: Build monitor image
        run: docker build -f monitor/Dockerfile -t container-pulse-monitor .
      - name: Build dashboard image
        run: docker build -f dashboard/Dockerfile -t container-pulse-dashboard .
      - name: Build app image
        run: docker build -f app/Dockerfile -t container-pulse-app ./app
