apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: container-pulse-monitor
      containers:
        - name: dashboard
          image: container-pulse-dashboard:latest
          imagePullPolicy: Never
          env:
            - name: MODE
              value: "kubernetes"
            - name: MONITORED_NAMESPACES
              value: "default"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
spec:
  selector:
    app: dashboard
  ports:
    - port: 8080
      targetPort: 8080
  type: NodePort
